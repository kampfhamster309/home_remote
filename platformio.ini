[env:cyd]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11
    PaulStoffregen/XPT2046_Touchscreen@^1.4
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^6.21.5

build_flags =
    ; ---- TFT_eSPI: bypass User_Setup.h, configure via flags ----
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=12
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=55000000
    ; ---- LVGL: pick up lv_conf.h from include/ ----
    -DLV_CONF_INCLUDE_SIMPLE=1
    -I$PROJECT_INCLUDE_DIR

; ----------------------------------------------------------------------------
; Native (host) test environment — no hardware needed
; ----------------------------------------------------------------------------
[env:native]
platform = native
build_flags =
    -std=c++17
    -I$PROJECT_INCLUDE_DIR
